<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeus AI Chat</title>
    <style>
        body { background: #0f0f0f; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #333; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; max-width: 80%; }
        .ai { background: #1a1a1a; align-self: flex-start; border-left: 3px solid #00ff00; }
        .user { background: #333; align-self: flex-end; margin-left: auto; text-align: right; }
        #input-area { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #00ff00; color: #fff; padding: 10px; border-radius: 5px; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-box">
        <div class="msg ai">⚡ ZEUS AI: النظام جاهز للبرمجة الذاتية. اطلب أي تعديل وسأقوم بتوليد الكود.</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="اكتب أمرك هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        function sendMessage() {
            let input = document.getElementById('user-input');
            let chatBox = document.getElementById('chat-box');
            if(input.value.trim() === "") return;

            // إضافة رسالة المستخدم
            chatBox.innerHTML += `<div class="msg user">${input.value}</div>`;
            
            // رد مؤقت من النظام (حتى نربط الـ API)
            setTimeout(() => {
                chatBox.innerHTML += `<div class="msg ai">جاري معالجة الطلب لتطوير النظام... تم استلام الأمر: [${input.value}]</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);

            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
